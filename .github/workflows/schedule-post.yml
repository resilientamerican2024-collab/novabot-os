name: Tannie Talks - Week 3 Content Prep

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which post to prepare (AM = 8am, PM = 6pm)'
        required: true
        default: 'AM'
        type: choice
        options:
          - AM
          - PM
  schedule:
    - cron: '0 13 * * 3'   # Wednesday 8am EST (13:00 UTC)
    - cron: '0 23 * * 3'   # Wednesday 6pm EST (23:00 UTC)

jobs:
  prepare-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install form-data node-fetch@2

      - name: Determine slot (AM or PM)
        id: slot
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "SLOT=${{ github.event.inputs.slot }}" >> $GITHUB_ENV
          else
            # For scheduled runs: 13:00 UTC = AM, 23:00 UTC = PM
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "13" ]; then
              echo "SLOT=AM" >> $GITHUB_ENV
            else
              echo "SLOT=PM" >> $GITHUB_ENV
            fi
          fi

      - name: Read content for this slot
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('week3-content.json', 'utf8'));
            const SLOT = process.env.SLOT;
            console.log('Looking for slot:', SLOT);
            const post = data.posts.find(p => p.slot === SLOT);
            if (!post) {
              console.error('No post found for slot:', SLOT);
              console.error('Available slots:', data.posts.map(p => p.slot));
              process.exit(1);
            }
            console.log('Found post:', JSON.stringify(post, null, 2));
            fs.writeFileSync('post-to-prepare.json', JSON.stringify(post, null, 2));
          "

      - name: Extract thumbnail from video (if video file exists)
        env:
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          if [ -f "videos/tannie_w3_wed_${SLOT,,}.mp4" ]; then
            echo "Video found, extracting thumbnail..."
            node extract-thumbnail.js videos/tannie_w3_wed_${SLOT,,}.mp4
          else
            echo "No video file found at videos/tannie_w3_wed_${SLOT,,}.mp4"
            echo "Skipping thumbnail extraction"
            echo '{"url":"placeholder","thumb":"placeholder"}' > imgbb-result.json
          fi

      - name: Build content summary for review
        run: |
          node -e "
            const fs = require('fs');
            const post = JSON.parse(fs.readFileSync('post-to-prepare.json', 'utf8'));
            const imgbb = JSON.parse(fs.readFileSync('imgbb-result.json', 'utf8'));
            
            const summary = {
              slot: post.slot,
              caption: post.caption,
              hashtags: post.hashtags,
              imgbb_url: imgbb.url,
              imgbb_thumb: imgbb.thumb,
              ready_for_review: true
            };
            
            console.log('=== TANNIE TALKS CONTENT SUMMARY ===');
            console.log(JSON.stringify(summary, null, 2));
            fs.writeFileSync('content-summary.json', JSON.stringify(summary, null, 2));
          "

      - name: Save content artifact
        uses: actions/upload-artifact@v4
        with:
          name: tannie-content-${{ env.SLOT }}
          path: content-summary.json
          retention-days: 7

      - name: Post Setup Node.js
        run: echo "Content prep complete for ${{ env.SLOT }}"

      - name: Post Checkout repo
        run: echo "Ready for manual review and posting"
