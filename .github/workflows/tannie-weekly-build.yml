name: Tannie Talks — Weekly Content Build

on:
  schedule:
    - cron: '0 13 * * 3'
    - cron: '0 23 * * 3'

  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to generate'
        required: true
        default: 'WED-AM'
        type: choice
        options:
          - WED-AM
          - WED-PM
      skip_email:
        description: 'Skip sending the review email (for dry runs)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-content:
    runs-on: ubuntu-latest
    # Generates images → builds reel → emails review package.
    # Nothing posts without Ingrid's manual approval.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install form-data node-fetch@2

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 20 ]; then
              echo "slot=WED-AM" >> $GITHUB_OUTPUT
            else
              echo "slot=WED-PM" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate panel images (DALL-E 3)
        id: generate
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          echo "🌹 Generating $SLOT — in memory of Kassandra, honoring the canon."
          node generate-tannie-images.js "$SLOT"
          SAFE="${SLOT//-/_}"
          LOWER=$(echo "$SAFE" | tr '[:upper:]' '[:lower:]')
          echo "results_file=tannie_${LOWER}_results.json" >> $GITHUB_OUTPUT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Create reel from panels (ffmpeg Ken Burns)
        id: reel
        if: steps.generate.outcome == 'success'
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          RESULTS="${{ steps.generate.outputs.results_file }}"
          node create-reel.js "$SLOT" "$RESULTS"
          # Copy MP4 to workspace so artifact can pick it up
          SAFE="${SLOT//-/_}"
          LOWER=$(echo "$SAFE" | tr '[:upper:]' '[:lower:]')
          cp /tmp/tannie_${LOWER}_week3.mp4 . 2>/dev/null || echo "MP4 not found in /tmp — skipping copy"
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Write GitHub Actions summary
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          RESULTS="${{ steps.generate.outputs.results_file }}"
          node -e "
            const fs = require('fs');
            const calendar = require('./content-calendar.json');
            const slot = '$SLOT';
            const slotData = calendar.posts.find(p => p.slot === slot);
            let panels = [], reelUrl = null;
            if (fs.existsSync('$RESULTS')) {
              const r = JSON.parse(fs.readFileSync('$RESULTS'));
              panels = r.panels || [];
              reelUrl = r.reel_url || null;
            }
            const ok = panels.filter(p => !p.error);
            const fail = panels.filter(p => p.error);
            const panelLinks = ok.map(p =>
              '- **Panel ' + p.panel_number + ':** [View →](' + p.imgbb_url + ')  \`' + p.emotion + '\`'
            ).join('\n');
            const errorList = fail.map(p =>
              '- Panel ' + p.panel_number + ': ' + p.error
            ).join('\n');
            const lines = [
              '## 🌹 Tannie Talks — ' + slot + ' Content Ready for Review',
              '',
              '> ⚠️ **Nothing has been posted.** Review below and post manually when ready.',
              '',
              '### 📝 Caption',
              '\`\`\`',
              slotData.caption,
              '\`\`\`',
              '',
              '### #️⃣ Hashtags',
              slotData.hashtags,
              '',
              reelUrl ? '### 🎬 Reel\n[▶ View / Download Reel](' + reelUrl + ')' : '### 🎬 Reel\n_Reel generation failed or Supabase upload failed._',
              '',
              '### 🖼️ Carousel Panels (' + ok.length + '/5)',
              panelLinks || '_No panels generated._',
              fail.length ? '\n### ❌ Errors\n' + errorList : '',
              '',
              '---',
              '_Every image honors Kassandra. In memory. In love. In faith._',
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
            console.log('Summary written.');
          "

      - name: Send review email to Ingrid
        if: ${{ github.event.inputs.skip_email != 'true' }}
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          RESULTS="${{ steps.generate.outputs.results_file }}"
          node email-weekly-package.js "$SLOT" "$RESULTS"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: admin@novaverseplatform.com
          FROM_EMAIL: onboarding@resend.dev

      - name: Save content artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tannie-${{ steps.slot.outputs.slot }}-week3
          path: |
            tannie_*_results.json
            tannie_*_week3.mp4
          retention-days: 14
