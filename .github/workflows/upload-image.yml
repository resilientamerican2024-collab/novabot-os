name: Upload Image to imgbb

on:
  workflow_dispatch:
    inputs:
      image_path:
        description: 'Path to image in repo (e.g., images/photo.jpg)'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install form-data node-fetch@2
        
      - name: Upload to imgbb
        env:
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: node upload-to-imgbb.js ${{ github.event.inputs.image_path }}
